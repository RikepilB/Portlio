project:
  name: "Richard Pillaca Portfolio v2"
  type: "Personal Portfolio Website"
  framework: "Next.js 16 (App Router)"
  language: "TypeScript (strict mode)"
  styling: "Tailwind CSS v4"
  package_manager: "pnpm"
  deployment: "Vercel"

tech_stack:
  - Next.js 16.1.6
  - React 19
  - TypeScript 5
  - Tailwind CSS 4.2.1
  - lucide-react 0.575.0
  - next-themes 0.4.6
  - clsx 2.1.1
  - tailwind-merge 3.5.0

pages:
  - route: "/"
    file: "src/app/page.tsx"
    type: "Server Component"
    description: "Home page with hero, featured projects, metrics, experience"

  - route: "/projects"
    file: "src/app/projects/page.tsx"
    type: "Client Component"
    description: "Projects gallery with category filter (DATA SCIENCE, RESEARCH, EXCEL AUTOMATION, FULL STACK)"

  - route: "/projects/[slug]"
    file: "src/app/projects/[slug]/page.tsx"
    type: "Server Component (generateStaticParams)"
    description: "Individual project case study with methodology, metrics, findings"
    slugs:
      - bike-share-optimization
      - ai-technical-debt-research
      - accounting-automation
      - exam-analysis-system

  - route: "/essays"
    file: "src/app/essays/page.tsx"
    type: "Server Component"
    description: "Essays/blog list with Substack CTA"

  - route: "/essays/[slug]"
    file: "src/app/essays/[slug]/page.tsx"
    type: "Server Component"
    description: "Individual essay page (MDX placeholder)"

  - route: "/about"
    file: "src/app/about/page.tsx"
    type: "Server Component"
    description: "About page with communities, beyond work, skills"

  - route: "/journey"
    file: "src/app/journey/page.tsx"
    type: "Client Component"
    description: "Career timeline with type filter (Work, Research, Volunteer)"

  - route: "/skills"
    file: "src/app/skills/page.tsx"
    type: "Server Component"
    description: "Skills grid organized by category"

  - route: "/resume"
    file: "src/app/resume/page.tsx"
    type: "Server Component"
    description: "Interactive resume with PDF download"

components:
  layout:
    - name: "Nav"
      file: "src/components/layout/Nav.tsx"
      type: "Client Component"
      features: "Fixed header, scroll detection, mobile menu, route highlighting"

    - name: "Footer"
      file: "src/components/layout/Footer.tsx"
      type: "Server Component"
      features: "Links grid, social links, contact info"

  ui:
    - name: "ProjectCard"
      file: "src/components/ui/ProjectCard.tsx"
      features: "Category tag, title, metrics, tech badges, hover animation"

    - name: "EssayCard"
      file: "src/components/ui/EssayCard.tsx"
      features: "Title, excerpt, date, read time, tags"

    - name: "MetricCard"
      file: "src/components/ui/MetricCard.tsx"
      features: "Large metric number with label"

    - name: "TechTag"
      file: "src/components/ui/TechTag.tsx"
      features: "Monospace pill badge for technologies"

    - name: "SectionHeader"
      file: "src/components/ui/SectionHeader.tsx"
      features: "Reusable heading with eyebrow and subtext"

    - name: "CursorBubble"
      file: "src/components/ui/CursorBubble.tsx"
      type: "Client Component"
      features: "Custom cursor tracking, grows on hover"

data_layer:
  - file: "src/data/projects.ts"
    exports: "Project interface, projects[], getProjectBySlug()"

  - file: "src/data/essays.ts"
    exports: "Essay interface, essays[]"

  - file: "src/data/experience.ts"
    exports: "Experience interface, experiences[]"

  - file: "src/data/social.ts"
    exports: "SocialLink interface, socialLinks[], contactInfo"

features:
  - "4 project case studies with full methodology and metrics"
  - "Category filtering on projects and journey pages"
  - "Mobile-first responsive design (375px, 768px, 1280px)"
  - "Custom cursor bubble effect"
  - "Fade-up scroll animations"
  - "Fixed navbar with scroll blur backdrop"
  - "Polaroid card design with mesh gradients"
  - "SEO metadata (Open Graph)"
  - "Static generation with generateStaticParams"
  - "Career timeline with filtering"
  - "Skills grid with categorized tools"
  - "Resume with PDF download"
  - "Substack subscribe CTA"
  - "Accessible: semantic HTML, aria-labels"

interactive_elements:
  - "Navigation links (Work, About, Journey, Skills, Resume)"
  - "Mobile hamburger menu toggle"
  - "Project category filter buttons"
  - "Journey type filter tabs (All, Work, Research, Volunteer)"
  - "Project cards (clickable, navigate to /projects/[slug])"
  - "Essay cards (clickable)"
  - "External links (GitHub, LinkedIn, Substack, email)"
  - "Resume PDF download button"
  - "Footer social/contact links"
